name: pages

# Build the giyf blueprint via `just graph` (in the project's nix
# devshell) and publish the resulting `scripts/` + `blueprint/` as the
# repo's GitHub Pages site. Pushes to `main` trigger an automatic
# deploy; `workflow_dispatch` lets us re-run manually.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One pages deploy at a time. Don't cancel in-flight deploys — a long
# Lean build is expensive and the next push can wait its turn.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          # Trust the project's flake config (extra substituters etc.)
          # so cache pulls work and we don't pay full source-build cost
          # for every Mathlib import.
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes

      - name: Cache .lake (keyed by lake-manifest.json)
        uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Cache blueprint dumper caches
        uses: actions/cache@v4
        with:
          # The per-dumper fingerprint files in blueprint/ let
          # `just graph` skip unchanged dumps. The `highlighted-cache/`
          # subdir is the per-module dumptactics cache (heaviest step).
          path: |
            blueprint/*.cache.hash
            blueprint/highlighted-cache
          key: blueprint-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            blueprint-${{ runner.os }}-

      - name: Build atlas graph (just graph)
        run: nix develop --accept-flake-config -c just graph

      - name: Stage dist/
        # `scripts/` carries the toc viewer (HTML + card.css + card.js
        # + vendor/), `blueprint/` carries the data JSON. The viewer
        # fetches data via `../blueprint/...` from `/scripts/toc.html`,
        # so the layout under dist/ matches the relative paths.
        #
        # Graph standalone view + cover index intentionally dropped —
        # the toc carries the embedded graph widget now. See
        # shed/BACKLOG.md "Atlas as canned viewer infrastructure"
        # for the eventual atlas-side packaging.
        run: |
          mkdir -p dist
          cp -r scripts dist/scripts
          cp -r blueprint dist/blueprint
          rm -f dist/scripts/graph.html dist/scripts/index.html
          cat > dist/index.html <<'HTML'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=./scripts/toc.html">
          <title>Theorem Atlas</title>
          <a href="./scripts/toc.html">→ Theorem Atlas</a>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
