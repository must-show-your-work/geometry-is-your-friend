<!doctype html>
<!--
  Theorem Atlas — table-of-contents view.

  Same `blueprint/graph.json` source as the graph viewer; the left
  pane is a kind/file grouped index; the right pane fills with the
  selected decl's content (statement → figure → commentary → source).

  Shared renderers live in `card.js` (Lean → KaTeX, source highlighter,
  marker-aware side-by-side). The graph view will eventually adopt
  the same module.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Theorem Atlas · TOC</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..900,0..100,0..1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./vendor/katex/katex.min.css?v=local-10">
<script src="./vendor/katex/katex.min.js?v=local-10"></script>
<link rel="stylesheet" href="./card.css?v=1">
<script src="./card.js?v=35"></script>

<style>
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; height: 100%;
  font-family: "Fraunces", Georgia, serif;
  color: var(--ink); background: var(--paper);
}
.app {
  display: grid; grid-template-columns: minmax(300px, 0.28fr) 1fr;
  height: 100vh;
}

/* ---------- Left pane: TOC ---------- */
.toc-pane {
  background: var(--paper-soft);
  border-right: 1px solid var(--paper-deep);
  display: grid; grid-template-rows: auto 1fr; overflow: hidden;
}
.toc-head {
  padding: 18px 22px 12px;
  border-bottom: 1px solid var(--paper-deep);
}
.toc-title { font-size: 20px; font-weight: 500; margin: 0 0 4px 0; letter-spacing: -0.01em; }
.toc-subtitle { font-size: 12px; color: var(--ink-muted); font-family: "JetBrains Mono", monospace; letter-spacing: 0.04em; }
.toc-filters { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-top: 14px; align-items: center; }
.toc-search, .toc-group-by {
  padding: 6px 10px; font: 13px/1.4 "Fraunces", Georgia, serif;
  background: var(--paper); border: 1px solid var(--paper-deep);
  border-radius: 3px; color: var(--ink);
}
.toc-search { width: 100%; }
.toc-search:focus, .toc-group-by:focus { outline: none; border-color: var(--ink-ghost); }
.toc-group-by { font: 11px/1.4 "JetBrains Mono", monospace; letter-spacing: 0.04em; color: var(--ink-muted); }
.export-wireframe {
  margin-top: 10px;
  padding: 5px 10px; background: var(--paper); border: 1px solid var(--paper-deep);
  border-radius: 3px; color: var(--ink-muted); cursor: pointer;
  font: 11px/1.4 "JetBrains Mono", monospace; letter-spacing: 0.04em;
  width: 100%; text-align: left;
}
.export-wireframe:hover { color: var(--accent); border-color: var(--ink-ghost); }
.export-wireframe:disabled { color: var(--ink-ghost); cursor: default; }
.mode-toggle {
  margin-top: 6px;
  padding: 5px 10px; background: var(--paper); border: 1px solid var(--paper-deep);
  border-radius: 3px; color: var(--ink-muted); cursor: pointer;
  font: 11px/1.4 "JetBrains Mono", monospace; letter-spacing: 0.04em;
  width: 100%; text-align: left;
}
.mode-toggle:hover { color: var(--accent); border-color: var(--ink-ghost); }
.toc-list { overflow-y: auto; padding: 8px 0 60px; }
.toc-group { padding: 14px 22px 6px; }
.toc-group-label {
  font: 500 11px/1 "JetBrains Mono", monospace; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--ink-muted);
  margin: 0 0 8px 0; display: flex; justify-content: space-between; align-items: baseline;
}
.toc-group-count { color: var(--ink-ghost); font-weight: 400; }
.toc-item {
  display: grid; grid-template-columns: minmax(90px, max-content) 1fr;
  gap: 10px; padding: 4px 22px;
  cursor: pointer; font-size: 13.5px; line-height: 1.35;
  border-left: 2px solid transparent; margin-left: -22px;
}
.toc-item:hover { background: var(--paper); }
.toc-item.active { background: var(--paper); border-left-color: var(--accent); }
.toc-item-id {
  font: 500 12px/1.35 "JetBrains Mono", monospace;
  color: var(--teal); white-space: nowrap;
}
.toc-item.kind-axiom .toc-item-id { color: #8a6a25; }
.toc-item.kind-corollary .toc-item-id { color: var(--accent-soft); }
.toc-item.kind-lemma .toc-item-id { color: var(--ink-muted); }
.toc-item.kind-exercise .toc-item-id { color: var(--teal-soft); }
.toc-item-title { color: var(--ink-soft); font-size: 13.5px; }
.toc-item.has-sorry .toc-item-title::after {
  content: ' ✕'; color: var(--accent); font-weight: 600; font-size: 11px;
}

</style>
</head>
<body>

<div class="app">
  <aside class="toc-pane">
    <header class="toc-head">
      <h1 class="toc-title" id="projTitle">Theorem Atlas</h1>
      <div class="toc-subtitle" id="projSubtitle">loading…</div>
      <div class="toc-filters">
        <input class="toc-search" id="search" type="search" placeholder="Filter by kind / number / title…">
        <select class="toc-group-by" id="groupBy">
          <option value="kind">group by kind</option>
          <option value="file">group by file</option>
        </select>
      </div>
      <button class="export-wireframe" id="exportWireframe"
              title="Export the current card layout as an SVG wireframe">
        ⇣ wireframe
      </button>
      <button class="mode-toggle" id="modeToggle"
              title="Toggle light / dark mode (Shift+D)">
        ◐ dark
      </button>
    </header>
    <div class="toc-list" id="tocList"></div>
  </aside>

  <main class="card-pane empty-pane" id="cardPane">
    <div class="empty-state">Select a theorem from the left.</div>
  </main>
</div>

<script>
'use strict';

const GRAPH_URL = '../blueprint/graph.json';
const MARKERS_URL = '../blueprint/markers.json';
const COMMENTARY_URL = '../blueprint/commentary.json';
const PROJECT_URL = '../blueprint/project.json';

const A = window.AtlasCard;
let DECLS = [];           // node.data, atlas-tagged only
let BY_SLUG = new Map();  // slug → decl (for URL anchor lookup)
let BY_ID = new Map();    // FQN → decl (for edge lookup)
let OUT_EDGES = new Map(); // src FQN → [dst FQN]
let IN_EDGES = new Map();  // dst FQN → [src FQN]

// ---------- Flag state (server-backed) ----------
// Flags live in SQLite at <project>/blueprint/atlas.sqlite, served by
// `atlas serve`'s `/api/flags` endpoint. We cache the full set in memory
// (`FLAGS: declId → {section: true}`) so isFlagged() is sync; toggleFlag
// POSTs/DELETEs and updates the cache optimistically.
const API_FLAGS = '/api/flags';       // host-absolute; /scripts/toc.html → /api/flags
const FLAG_LEGACY_KEY = 'atlas.toc.flags.v1';
const FLAG_MIGRATED_KEY = 'atlas.toc.flags.migrated.v1';
let FLAGS = {};

async function loadFlags() {
  try {
    const r = await fetch(API_FLAGS, { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    FLAGS = await r.json();
  } catch (e) {
    console.warn('flag load failed:', e);
    FLAGS = {};
  }
}

function isFlagged(declId, section) {
  return !!(FLAGS[declId] && FLAGS[declId][section]);
}

async function toggleFlag(declId, section) {
  const currently = isFlagged(declId, section);
  if (currently) {
    delete FLAGS[declId][section];
    if (Object.keys(FLAGS[declId]).length === 0) delete FLAGS[declId];
    try {
      await fetch(`${API_FLAGS}/${encodeURIComponent(declId)}/${encodeURIComponent(section)}`,
                  { method: 'DELETE' });
    } catch (e) { console.warn('flag delete failed:', e); }
    return false;
  } else {
    (FLAGS[declId] ||= {})[section] = new Date().toISOString();
    try {
      await fetch(API_FLAGS, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ decl_id: declId, section }),
      });
    } catch (e) { console.warn('flag add failed:', e); }
    return true;
  }
}

// One-shot: if the previous (localStorage-only) flag store has entries
// and we haven't migrated yet, POST each one to the server then mark
// migrated. Idempotent: running on an already-migrated browser is a
// no-op. We don't clear localStorage in case the server fails — easier
// to recover by hand.
async function migrateLocalStorageFlags() {
  if (localStorage.getItem(FLAG_MIGRATED_KEY)) return;
  let legacy;
  try { legacy = JSON.parse(localStorage.getItem(FLAG_LEGACY_KEY) || '{}'); }
  catch { legacy = {}; }
  const entries = Object.keys(legacy);
  if (entries.length === 0) {
    localStorage.setItem(FLAG_MIGRATED_KEY, '1');
    return;
  }
  console.log(`[atlas] migrating ${entries.length} localStorage flags to /api/flags`);
  for (const key of entries) {
    const sep = key.lastIndexOf('::');
    if (sep < 0) continue;
    const decl_id = key.slice(0, sep);
    const section = key.slice(sep + 2);
    try {
      await fetch(API_FLAGS, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ decl_id, section }),
      });
    } catch (e) { console.warn('flag migrate failed for', key, e); }
  }
  localStorage.setItem(FLAG_MIGRATED_KEY, '1');
}

// kind+number → URL slug. Slug-safe ASCII so it survives a URL hash
// without %-encoding (no French quotes, no spaces).
function declSlug(d) {
  const k = (d.atlas_kind || '').toLowerCase().replace(/[^a-z0-9.-]/g, '_');
  const n = (d.atlas_number || '').replace(/[^a-zA-Z0-9.-]/g, '_');
  return `${k}-${n}`;
}

async function loadAll() {
  const [graphR, markersR, commentaryR, projectR] = await Promise.all([
    fetch(GRAPH_URL, { cache: 'no-store' }),
    fetch(MARKERS_URL, { cache: 'no-store' }),
    fetch(COMMENTARY_URL, { cache: 'no-store' }),
    fetch(PROJECT_URL, { cache: 'no-store' }).catch(() => null),
  ]);
  // Project title / subtitle — driven by a per-project sidecar so
  // every consumer (giyf, EWM, etc.) gets its own branding without
  // viewer-side hardcoding. Optional: falls back to generic labels.
  if (projectR && projectR.ok) {
    try {
      const proj = await projectR.json();
      if (proj.title)    document.getElementById('projTitle').textContent = proj.title;
      if (proj.subtitle) document.getElementById('projSubtitle').textContent = proj.subtitle;
      else               document.getElementById('projSubtitle').textContent = '';
      if (proj.title)    document.title = proj.title + ' · Atlas';
    } catch { /* tolerate */ }
  } else {
    document.getElementById('projSubtitle').textContent = '';
  }
  if (!graphR.ok) throw new Error(`HTTP ${graphR.status} loading ${GRAPH_URL}`);
  const g = await graphR.json();
  DECLS = g.nodes.map(n => n.data).filter(d => d.atlas_kind);
  BY_SLUG = new Map(DECLS.map(d => [declSlug(d), d]));
  BY_ID = new Map(DECLS.map(d => [d.id, d]));
  // Edge maps for incoming/outgoing references on each card.
  OUT_EDGES = new Map();
  IN_EDGES = new Map();
  for (const e of (g.edges || [])) {
    const s = e.data?.source, t = e.data?.target;
    if (!s || !t) continue;
    (OUT_EDGES.get(s) ?? OUT_EDGES.set(s, []).get(s)).push(t);
    (IN_EDGES.get(t) ?? IN_EDGES.set(t, []).get(t)).push(s);
  }

  // markers.json shape: `{kind: [{decl, line, column, text, ...}, ...]}`
  // where kind ∈ {quoting, comment, page_break, idea, intuition, ...}.
  // Tag each marker with `_kind` (what renderMarkerLeft dispatches on)
  // and index by decl FQN for renderSourceWithMarkers's lookup.
  window.markersByDecl = {};
  if (markersR.ok) {
    try {
      const ms = await markersR.json();
      for (const [kind, list] of Object.entries(ms)) {
        if (!Array.isArray(list)) continue;
        for (const m of list) {
          const target = m.decl || m.target;
          if (!target) continue;
          m._kind = kind;
          (window.markersByDecl[target] ||= []).push(m);
        }
      }
    } catch (e) { console.warn('markers.json:', e); }
  }
  // commentary.json — array of commentary blocks, each with `.decl`.
  window.commentaryByDecl = {};
  if (commentaryR.ok) {
    try {
      const cs = await commentaryR.json();
      for (const cb of (cs.commentary || cs || [])) {
        if (cb.decl) window.commentaryByDecl[cb.decl] = cb;
      }
    } catch { /* tolerate */ }
  }
}

// ---------- TOC sort + render ----------

const ROMAN = {i:1, ii:2, iii:3, iv:4, v:5, vi:6, vii:7, viii:8, ix:9, x:10};
function numKey(s) {
  if (!s) return [];
  return s.split('.').map(part => {
    const n = parseInt(part, 10);
    if (Number.isFinite(n) && String(n) === part) return [0, n, ''];
    if (ROMAN[part.toLowerCase()] != null) return [1, ROMAN[part.toLowerCase()], ''];
    return [2, 0, part];
  });
}
function cmpNumber(a, b) {
  const ka = numKey(a), kb = numKey(b);
  for (let i = 0; i < Math.max(ka.length, kb.length); i++) {
    const x = ka[i] || [9, 0, ''], y = kb[i] || [9, 0, ''];
    if (x[0] !== y[0]) return x[0] - y[0];
    if (x[1] !== y[1]) return x[1] - y[1];
    if (x[2] !== y[2]) return x[2].localeCompare(y[2]);
  }
  return 0;
}
const KIND_ORDER = ['axiom','lemma','proposition','theorem','corollary','alternate','exercise','definition'];
function cmpKind(a, b) {
  const ia = KIND_ORDER.indexOf(a), ib = KIND_ORDER.indexOf(b);
  return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
}

// Suppressed decls (commentary block carries `suppress`) hide from the
// TOC list and the graph index but stay reachable by direct URL hash
// or via a ref-chip from a non-suppressed decl that cites them.
function isSuppressed(d) {
  const cb = (window.commentaryByDecl && window.commentaryByDecl[d.id]) || null;
  return !!(cb && cb.suppress);
}

function groupAndRender() {
  const groupBy = document.getElementById('groupBy').value;
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = DECLS.filter(d => {
    if (isSuppressed(d)) return false;
    if (!q) return true;
    const hay = [d.atlas_kind, d.atlas_number, d.atlas_title, d.label].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  });
  const groups = new Map();
  for (const d of filtered) {
    const key = groupBy === 'file' ? (d.module || '<unknown>') : d.atlas_kind;
    (groups.get(key) || groups.set(key, []).get(key)).push(d);
  }
  const groupKeys = [...groups.keys()].sort((a, b) =>
    groupBy === 'kind' ? cmpKind(a, b) : a.localeCompare(b));
  for (const k of groupKeys) groups.get(k).sort((a, b) => cmpNumber(a.atlas_number, b.atlas_number));

  const out = [];
  for (const k of groupKeys) {
    const items = groups.get(k);
    out.push(`<section class="toc-group">
      <h2 class="toc-group-label"><span>${A.escapeHtml(k)}</span><span class="toc-group-count">${items.length}</span></h2>
      ${items.map(d => `<div class="toc-item kind-${A.escapeHtml(d.atlas_kind)}${d.has_sorry ? ' has-sorry' : ''}" data-slug="${A.escapeHtml(declSlug(d))}">
        <span class="toc-item-id">${A.escapeHtml(d.atlas_kind)} ${A.escapeHtml(d.atlas_number)}</span>
        <span class="toc-item-title">${A.escapeHtml(d.atlas_title || d.label)}</span>
      </div>`).join('')}
    </section>`);
  }
  document.getElementById('tocList').innerHTML = out.join('');
}

// ---------- Card render ----------

function renderRefChip(targetId) {
  const t = BY_ID.get(targetId);
  if (!t) {
    return `<span class="ref-chip" title="${A.escapeHtml(targetId)} (no atlas tag)">
      <span class="ref-chip-id">${A.escapeHtml(targetId.split('.').pop())}</span>
    </span>`;
  }
  return `<span class="ref-chip" data-target-slug="${A.escapeHtml(declSlug(t))}"
       title="${A.escapeHtml(t.id)}">
    <span class="ref-chip-id">${A.escapeHtml(t.atlas_kind)} ${A.escapeHtml(t.atlas_number)}</span>
    <span class="ref-chip-title">${A.escapeHtml(t.atlas_title || t.label)}</span>
  </span>`;
}

// Lexisort references by (kind, number) so the chips read in a
// stable, scan-friendly order regardless of edge ingestion order
// from `graph.json`.
function sortRefs(ids) {
  return ids.slice().sort((a, b) => {
    const da = BY_ID.get(a), db = BY_ID.get(b);
    const ka = (da && da.atlas_kind) || ''; const kb = (db && db.atlas_kind) || '';
    if (ka !== kb) return ka.localeCompare(kb);
    const na = (da && da.atlas_number) || ''; const nb = (db && db.atlas_number) || '';
    return cmpNumber(na, nb);
  });
}

function renderRefsSection(d) {
  const outs = sortRefs(OUT_EDGES.get(d.id) || []);
  const ins  = sortRefs(IN_EDGES.get(d.id)  || []);
  if (outs.length === 0 && ins.length === 0) return '';
  return `
    <section class="card-section" data-section="references">
      <button class="flag-btn" data-flag-section="references">flag</button>
      <div class="card-section-label">references</div>
      <div class="refs-grid">
        <div>
          <div class="refs-col-label">cites (${outs.length})</div>
          ${outs.length ? outs.map(renderRefChip).join('') : '<div class="refs-empty">none</div>'}
        </div>
        <div>
          <div class="refs-col-label">cited by (${ins.length})</div>
          ${ins.length ? ins.map(renderRefChip).join('') : '<div class="refs-empty">none</div>'}
        </div>
      </div>
    </section>`;
}

// ---------- Line flags ----------
// Per-line flags within the source pane. State is `LINE_FLAGS: line → ts`
// for the currently-selected decl (fetched fresh on each selectSlug).
// Shift-click on a line range-flags from `LINE_LAST_CLICKED` to the
// clicked line; plain click toggles a single line.

const API_LINE_FLAGS = '/api/line-flags';
let LINE_FLAGS = {};      // map from string-line → ISO timestamp
let LINE_LAST_CLICKED = null;

async function fetchLineFlags(declId) {
  try {
    const r = await fetch(`${API_LINE_FLAGS}?decl=${encodeURIComponent(declId)}`,
                          { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    LINE_FLAGS = await r.json();
  } catch (e) {
    console.warn('line-flags load failed:', e);
    LINE_FLAGS = {};
  }
}

function isLineFlagged(line) { return !!LINE_FLAGS[String(line)]; }

async function addLineFlag(declId, line) {
  LINE_FLAGS[String(line)] = new Date().toISOString();
  try {
    await fetch(API_LINE_FLAGS, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ decl_id: declId, line }),
    });
  } catch (e) { console.warn('line-flag add failed:', e); }
}

async function removeLineFlag(declId, line) {
  delete LINE_FLAGS[String(line)];
  try {
    await fetch(`${API_LINE_FLAGS}/${encodeURIComponent(declId)}/${line}`,
                { method: 'DELETE' });
  } catch (e) { console.warn('line-flag delete failed:', e); }
}

function applyLineFlagState() {
  // Source lines AND marker blocks both carry `data-line`; both
  // visually highlight when their underlying line is flagged.
  for (const el of document.querySelectorAll('.bn-line[data-line], .bn-marker[data-line]')) {
    const n = parseInt(el.dataset.line, 10);
    el.classList.toggle('flagged', isLineFlagged(n));
  }
}

// ---------- Notes ----------

const API_NOTES = '/api/notes';

async function fetchNotes(declId) {
  try {
    const r = await fetch(`${API_NOTES}?decl=${encodeURIComponent(declId)}`,
                          { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch (e) {
    console.warn('notes load failed:', e);
    return [];
  }
}

function fmtNoteWhen(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  // YYYY-MM-DD HH:MM — short enough for the meta column.
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function renderNotesSection(declId, notes) {
  const list = (notes && notes.length)
    ? `<div class="notes-list">${notes.map(n => `
        <div class="note" data-note-id="${n.id}">
          <div class="note-meta">
            ${A.escapeHtml(fmtNoteWhen(n.created_at))}
            ${n.section ? `<br><span style="color:var(--teal)">${A.escapeHtml(n.section)}</span>` : ''}
          </div>
          <div class="note-body">${A.escapeHtml(n.body)}</div>
          <button class="note-delete" data-note-id="${n.id}" title="delete note">✕</button>
        </div>`).join('')}</div>`
    : `<div class="notes-empty">No notes yet.</div>`;
  return `
    <section class="card-section" data-section="notes">
      <button class="flag-btn" data-flag-section="notes">flag</button>
      <div class="card-section-label">notes</div>
      ${list}
      <div class="note-composer">
        <textarea class="note-input" data-note-input="${A.escapeHtml(declId)}"
                  placeholder="Add a note…"></textarea>
        <div class="note-controls">
          <button class="note-save" data-note-save="${A.escapeHtml(declId)}">save</button>
          <span class="note-hint">Cmd/Ctrl+Enter to save</span>
        </div>
      </div>
    </section>`;
}

// Each card section gets a `flag-btn` (positioned absolute, hidden until
// hover). Clicking toggles a per-section flag stored in /api/flags so
// reviewers can mark "this section has a problem" while walking the corpus.
function flaggableSection(name, label, body) {
  return `
    <section class="card-section" data-section="${A.escapeHtml(name)}">
      <button class="flag-btn" data-flag-section="${A.escapeHtml(name)}">flag</button>
      <div class="card-section-label">${A.escapeHtml(label)}</div>
      ${body}
    </section>`;
}

// Compute the set of absolute file lines we drop from the proof
// source column. Two categories:
//   - the decl prelude (everything from `atlas <kind> <num> "…"` /
//     `theorem foo …` through the line containing `:= by`) —
//     duplicates the statement pane.
//   - marker syntax (`quoting (N) "…"` / `comment "…"` / `idea "…"` /
//     …) whose parsed text already shows in the LHS/RHS proof
//     columns. Multi-line string literals tracked via the same
//     state machine.
// Optional `· ` bullet prefix — case-branch markers like
// `· quoting (5) "…"` are common inside `rcases`/`obtain` arms;
// without this prefix tolerance, the elider missed them and the
// string literal leaked into the source column.
const MARKER_KW = /^\s*(?:·\s+)?(quoting|comment|idea|intuition|motivation|caution|aside|cf|todo|fixme|detail|page_break)\b/;
function computeMarkerLines(source, baseLine) {
  const elided = new Set();
  const lines = source.split('\n');

  // Decl prelude: scan forward until we hit a line whose content
  // (post-`--` comment) ends with `:= by`. Elide every line up to
  // and including that one. If no `:= by` is found (axiom / `def`
  // / one-line `:=` body), no prelude is elided.
  let preludeEnd = -1;
  for (let i = 0; i < lines.length; i++) {
    // Strip the part after `--` so a trailing line comment doesn't
    // smuggle a fake `:= by` past us.
    const code = lines[i].replace(/--.*/, '').trimEnd();
    if (code.endsWith(':= by')) { preludeEnd = i; break; }
  }
  for (let i = 0; i <= preludeEnd; i++) elided.add(baseLine + i);

  // `auxillary { … }` blocks: not markers, but their source belongs
  // in the rendered SVG (attached separately as aux figures), not in
  // the proof code. One-liner `auxillary { assert ... }` and
  // multi-line `auxillary { ⏎ ... ⏎ }` both elide here via brace
  // counting. String literals are ignored for brace tracking, so
  // `auxillary "desc" { ... }` works too.
  const AUX_KW = /^\s*(?:·\s+)?auxillary\b/;
  let ai = preludeEnd + 1;
  while (ai < lines.length) {
    if (!AUX_KW.test(lines[ai])) { ai++; continue; }
    let depth = 0, sawOpen = false, inStr = false, k = ai;
    while (k < lines.length) {
      elided.add(baseLine + k);
      const ln = lines[k];
      for (let p = 0; p < ln.length; p++) {
        const ch = ln[p];
        if (ch === '\\') { p++; continue; }
        if (ch === '"') { inStr = !inStr; continue; }
        if (inStr) continue;
        if (ch === '{') { depth++; sawOpen = true; }
        else if (ch === '}') { depth--; }
      }
      if (sawOpen && depth === 0) break;
      k++;
    }
    ai = k + 1;
  }

  let i = preludeEnd + 1;
  while (i < lines.length) {
    if (!MARKER_KW.test(lines[i])) { i++; continue; }
    elided.add(baseLine + i);
    // Track string literal across lines: count backslash escapes, find
    // the unescaped closing quote. If the marker has no string (e.g.
    // `page_break` is just a bare keyword), `inString` stays false and
    // we elide only the single line.
    let inString = false;
    let scanIdx = 0;
    let k = i;
    while (k < lines.length) {
      const ln = lines[k];
      while (scanIdx < ln.length) {
        const ch = ln[scanIdx];
        if (ch === '\\') { scanIdx += 2; continue; }
        if (ch === '"') {
          inString = !inString;
          scanIdx++;
          if (!inString) break;
          continue;
        }
        scanIdx++;
      }
      if (!inString) break;
      k++;
      if (k < lines.length) elided.add(baseLine + k);
      scanIdx = 0;
    }
    i = k + 1;
  }
  return elided;
}

// Render a 3-col proof view from the source + markers. Left column =
// author quotes (the `quoting` markers). Middle = lean source, line by
// line. Right column = editor commentary (`comment`, `idea`,
// `intuition`, etc.) plus future inline figure deltas from
// `auxiliary { … }` blocks (TODO #67).
//
// Filtering strategy: lines that are part of marker syntax disappear
// entirely from the rendered proof. Each marker slides to the next
// non-elided source line so it stays anchored to the proof step it
// documents. Runs of blank lines that bracket an elided region
// collapse to a single blank.
function renderProofTriColumn(d) {
  const source = d.source || '';
  if (!source) {
    return `<div class="bn-empty">no source</div>`;
  }
  const baseLine = d.line_start || 1;
  const lines = source.split('\n');
  const ms = (window.markersByDecl && window.markersByDecl[d.id]) || [];
  const elided = computeMarkerLines(source, baseLine);
  const lastAbs = baseLine + lines.length - 1;

  // Slide each marker forward to the next non-elided line. Falls back
  // to the line itself if the search runs off the end of the source.
  const slideForward = (line) => {
    let n = line;
    while (n <= lastAbs && elided.has(n)) n++;
    return n > lastAbs ? line : n;
  };
  const leftByLine = {};
  const rightByLine = {};
  for (const m of ms) {
    const anchor = slideForward(m.line);
    if (m._kind === 'quoting' || m._kind === 'page_break') {
      (leftByLine[anchor] ||= []).push(m);
    } else {
      (rightByLine[anchor] ||= []).push(m);
    }
  }
  // Aux figures (`auxillary { … }` blocks) attach to the RHS column
  // alongside editor markers. Each one carries its rendered SVG and
  // an optional description; renderMarkerLeft dispatches on
  // `_kind === 'aux-figure'`.
  for (const fig of (d.aux_figures || [])) {
    const anchor = slideForward(fig.line);
    (rightByLine[anchor] ||= []).push({
      _kind: 'aux-figure',
      line: fig.line,
      svg: fig.svg,
      description: fig.description,
    });
  }

  // Drop elided rows entirely, then compress consecutive blank rows.
  // The compress pass kicks in after elision because removing a
  // marker line often leaves blanks on both sides that collapse.
  const kept = [];
  let prevBlank = false;
  for (let i = 0; i < lines.length; i++) {
    const abs = baseLine + i;
    if (elided.has(abs)) { prevBlank = false; continue; }
    const isBlank = lines[i].trim() === '';
    if (isBlank && prevBlank) continue;
    kept.push({ abs, line: lines[i], isBlank });
    prevBlank = isBlank;
  }
  // Trim leading/trailing blanks in the kept slice.
  while (kept.length && kept[0].isBlank) kept.shift();
  while (kept.length && kept[kept.length-1].isBlank) kept.pop();

  // Build the source-column cells first — one per kept line. Each
  // gets an explicit `grid-row` so we can place markers separately.
  const sourceCells = kept.map(({ abs, line }, i) => {
    const codeInner = A.highlightLean(line) || '&nbsp;';
    const gridRow = i + 1;
    return `<div class="proof-col-source" style="grid-row:${gridRow}">`
         + `<pre class="bn-code"><span class="bn-line" data-line="${abs}">${codeInner}</span></pre>`
         + `</div>`;
  });

  // Markers anchor to a single row (their slid-forward source line)
  // and rely on local inflation. Aux figures, however, span from
  // their anchor down to the next right-column anchor (or the last
  // row), so the figure fills any empty right-column space below its
  // attachment line instead of inflating that single row. The
  // line-attachment story stays legible because the column-divider
  // border still glows beside the anchor source line.
  const rowOfAbs = new Map(kept.map(({ abs }, i) => [abs, i + 1]));
  const lastRowPlusOne = kept.length + 1;
  function placeMarkers(byLine, colClass, spanAuxToNext) {
    const anchors = Object.keys(byLine).map(Number).sort((a, b) => a - b);
    return anchors.map((anchor, i) => {
      const startRow = rowOfAbs.get(anchor);
      if (!startRow) return '';
      const items = byLine[anchor];
      // Span only when (1) we're on a column that opted in and (2)
      // this anchor's payload contains an aux figure (text markers
      // alone should anchor tight to their source line).
      const hasAuxFigure = items.some(it => it._kind === 'aux-figure');
      let style = `grid-row:${startRow}`;
      if (spanAuxToNext && hasAuxFigure) {
        const next = anchors[i + 1];
        const endRow = (next != null && rowOfAbs.get(next)) || lastRowPlusOne;
        if (endRow > startRow + 1) {
          style = `grid-row:${startRow} / ${endRow}`;
        }
      }
      const inner = items.map(A.renderMarkerLeft).join('');
      return `<div class="${colClass}" style="${style}">${inner}</div>`;
    }).join('');
  }
  const leftCells  = placeMarkers(leftByLine,  'proof-col-quoting', false);
  const rightCells = placeMarkers(rightByLine, 'proof-col-commentary', true);

  return `<div class="proof-grid">${sourceCells.join('')}${leftCells}${rightCells}</div>`;
}

function renderCard(d) {
  // Statement render comes from LeanTeX's AST-walking pretty printer
  // (`blueprint/type-tex.json`, populated by giyf's `DumpTypeTeX.lean`).
  // The regex-driven `leanToLatex` pipeline was removed once the AST
  // path produced equivalent output for every Pasch-era decl; see
  // `shed/forks/LeanTeX.md` for the per-rule trail.
  const typeTexHtml = d.type_tex ? A.renderTypeHtmlFromTex(d.type_tex) : '';
  const cb = (window.commentaryByDecl && window.commentaryByDecl[d.id]) || null;

  const statementBody = `<div class="card-statement${typeTexHtml ? '' : ' empty'}">${typeTexHtml || '(no type signature)'}</div>`;
  const figureBody = d.figure_svg
    ? `<div class="card-figure">${d.figure_svg}</div>`
    : `<div class="card-figure placeholder">no figure</div>`;

  // Title cluster: the long-form name (from commentary) wins over
  // `atlas_title` since the commentary's `name` is usually richer.
  // Aliases/tags/page sit right under as inline chips; the docstring
  // (if any) follows as a small italic subtitle.
  const titleName = (cb && cb.name) || d.atlas_title || d.label;
  const titleMetaChips = [];
  if (cb && cb.page) {
    const pe = cb.page_end ? '–' + A.escapeHtml(cb.page_end) : '';
    titleMetaChips.push(`<span class="cb-page">📖 p.${A.escapeHtml(cb.page)}${pe}</span>`);
  }
  if (cb && cb.aliases && cb.aliases.length) {
    titleMetaChips.push(`<div class="cb-aliases">aka: ${cb.aliases.map(a =>
      `<span class="cb-alias-chip">${A.escapeHtml(a)}</span>`).join(' ')}</div>`);
  }
  if (cb && cb.tags && cb.tags.length) {
    titleMetaChips.push(`<div class="cb-tags">${cb.tags.map(t =>
      `<span class="cb-tag-chip">#${A.escapeHtml(t)}</span>`).join(' ')}</div>`);
  }
  const titleBlock = `
    <section class="title-block">
      <div class="cb-name">${A.escapeHtml(titleName)}</div>
      ${titleMetaChips.length ? `<div class="title-meta">${titleMetaChips.join('')}</div>` : ''}
      ${d.doc ? `<div class="card-doc">${A.escapeHtml(d.doc)}</div>` : ''}
    </section>`;

  const prefaceBody = (cb && cb.preface)
    ? `<blockquote class="cb-preface">${A.escapeHtml(cb.preface)}</blockquote>`
    : '<div class="bn-empty">no preface</div>';
  const ednotesBody = (cb && cb.notes)
    ? `<div class="cb-notes">${A.escapeHtml(cb.notes)}</div>`
    : '<div class="bn-empty">no editorial notes</div>';

  return `
    <header class="card-head">
      <span class="card-head-kind">§ ${A.escapeHtml(d.atlas_kind || d.kind)}</span>
      ${d.atlas_number ? `<span class="card-head-sep">·</span><span class="card-head-number">${A.escapeHtml(d.atlas_number)}</span>` : ''}
      ${d.has_sorry ? '<span class="card-head-sorry">sorry</span>' : ''}
    </header>
    <div class="lhs-stack">
      ${titleBlock}
      ${flaggableSection('preface',   'preface',   prefaceBody)}
      ${flaggableSection('statement', 'statement', statementBody)}
      ${flaggableSection('ednotes',   'ed. notes', ednotesBody)}
    </div>
    ${flaggableSection('figure',    'figure',    figureBody)}
    ${flaggableSection('proof',     'proof',     renderProofTriColumn(d))}
    ${renderRefsSection(d)}
    <section class="card-section" data-section="notes" data-notes-host="${A.escapeHtml(d.id)}">
      <button class="flag-btn" data-flag-section="notes">flag</button>
      <div class="card-section-label">notes</div>
      <div class="notes-empty">loading…</div>
    </section>

    <footer class="card-meta">
      <span>${A.escapeHtml(d.module || '')}</span>
      ${d.line_start ? `<span class="card-meta-sep">·</span><span>L${d.line_start}${d.line_end && d.line_end !== d.line_start ? `–${d.line_end}` : ''}</span>` : ''}
      <span class="card-meta-sep">·</span><span>${A.escapeHtml(d.file || '')}</span>
      <div class="card-fqn">${A.escapeHtml(d.id)}</div>
    </footer>`;
}

// Apply persisted flag state to the rendered card.
function applyFlagState(declId) {
  for (const sec of document.querySelectorAll('.card-section[data-section]')) {
    const name = sec.dataset.section;
    const on = isFlagged(declId, name);
    sec.classList.toggle('flagged', on);
    const btn = sec.querySelector('.flag-btn');
    if (btn) {
      btn.classList.toggle('flagged', on);
      btn.textContent = on ? 'flagged' : 'flag';
    }
  }
}

async function selectSlug(slug) {
  const d = BY_SLUG.get(slug);
  const pane = document.getElementById('cardPane');
  if (!d) {
    pane.classList.add('empty-pane');
    pane.innerHTML = '<div class="empty-state">Decl not found.</div>';
    return;
  }
  pane.classList.remove('empty-pane');
  pane.innerHTML = renderCard(d);
  pane.scrollTop = 0;
  applyFlagState(d.id);
  for (const el of document.querySelectorAll('.toc-item')) {
    el.classList.toggle('active', el.dataset.slug === slug);
  }
  history.replaceState(null, '', `#${encodeURIComponent(slug)}`);
  // Async tier: notes + line-flags both depend on a server round-trip
  // and shouldn't block initial render. If the user clicks to another
  // decl before these settle, the host elements are gone; bail.
  LINE_FLAGS = {}; LINE_LAST_CLICKED = null;
  await Promise.all([
    fetchNotes(d.id).then(notes => {
      const host = pane.querySelector(`[data-notes-host="${CSS.escape(d.id)}"]`);
      if (host) host.outerHTML = renderNotesSection(d.id, notes);
    }),
    fetchLineFlags(d.id).then(() => applyLineFlagState()),
  ]);
  applyFlagState(d.id);
}

async function saveNote(declId) {
  const ta = document.querySelector(`textarea[data-note-input="${CSS.escape(declId)}"]`);
  if (!ta) return;
  const body = ta.value.trim();
  if (!body) return;
  try {
    const r = await fetch(API_NOTES, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ decl_id: declId, body }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
  } catch (e) { console.warn('save note failed:', e); return; }
  ta.value = '';
  // Re-render the notes section in place.
  const notes = await fetchNotes(declId);
  const sec = ta.closest('.card-section[data-section="notes"]');
  if (sec) sec.outerHTML = renderNotesSection(declId, notes);
  applyFlagState(declId);
}

async function deleteNote(noteId, declId) {
  try {
    const r = await fetch(`${API_NOTES}/${noteId}`, { method: 'DELETE' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
  } catch (e) { console.warn('delete note failed:', e); return; }
  const notes = await fetchNotes(declId);
  const sec = document.querySelector('.card-section[data-section="notes"]');
  if (sec) sec.outerHTML = renderNotesSection(declId, notes);
  applyFlagState(declId);
}

document.getElementById('tocList').addEventListener('click', ev => {
  const item = ev.target.closest('.toc-item');
  if (item) selectSlug(item.dataset.slug);
});

// Card pane: ref-chip navigation + flag-button toggle + notes save/delete.
document.getElementById('cardPane').addEventListener('click', async ev => {
  // Save note button.
  const noteSave = ev.target.closest('[data-note-save]');
  if (noteSave) {
    ev.stopPropagation();
    await saveNote(noteSave.dataset.noteSave);
    return;
  }
  // Delete note button.
  const noteDel = ev.target.closest('.note-delete');
  if (noteDel) {
    ev.stopPropagation();
    const slug = decodeURIComponent(location.hash.slice(1));
    const d = BY_SLUG.get(slug);
    if (d) await deleteNote(parseInt(noteDel.dataset.noteId, 10), d.id);
    return;
  }
  // Flag button.
  const flag = ev.target.closest('.flag-btn');
  if (flag) {
    ev.stopPropagation();
    const sec = flag.closest('.card-section');
    if (!sec) return;
    const slug = decodeURIComponent(location.hash.slice(1));
    const d = BY_SLUG.get(slug);
    if (!d) return;
    const on = await toggleFlag(d.id, sec.dataset.section);
    sec.classList.toggle('flagged', on);
    flag.classList.toggle('flagged', on);
    flag.textContent = on ? 'flagged' : 'flag';
    return;
  }
  // Source line OR marker block click → toggle flag (shift-click
  // ranges from last clicked line to current). Has to come AFTER
  // more specific buttons. Markers carry the same `data-line`
  // attribute as source lines, so the same handler covers both —
  // a `quoting` block flag and a flag on its source line are the
  // same flag.
  const line = ev.target.closest('.bn-line[data-line], .bn-marker[data-line]');
  if (line) {
    const slug = decodeURIComponent(location.hash.slice(1));
    const d = BY_SLUG.get(slug);
    if (!d) return;
    const n = parseInt(line.dataset.line, 10);
    if (ev.shiftKey && LINE_LAST_CLICKED != null && LINE_LAST_CLICKED !== n) {
      const [lo, hi] = n < LINE_LAST_CLICKED ? [n, LINE_LAST_CLICKED] : [LINE_LAST_CLICKED, n];
      // Range adds — never deletes — so shift-click expands a region
      // without accidentally clearing flags that overlap the range.
      for (let k = lo; k <= hi; k++) {
        if (!isLineFlagged(k)) await addLineFlag(d.id, k);
      }
    } else {
      if (isLineFlagged(n)) await removeLineFlag(d.id, n);
      else                  await addLineFlag(d.id, n);
    }
    LINE_LAST_CLICKED = n;
    applyLineFlagState();
    return;
  }
  const chip = ev.target.closest('.ref-chip[data-target-slug]');
  if (chip) selectSlug(chip.dataset.targetSlug);
});

// Cmd/Ctrl+Enter in the note textarea triggers save.
document.getElementById('cardPane').addEventListener('keydown', ev => {
  if (ev.key !== 'Enter' || !(ev.metaKey || ev.ctrlKey)) return;
  const ta = ev.target.closest('textarea[data-note-input]');
  if (!ta) return;
  ev.preventDefault();
  saveNote(ta.dataset.noteInput);
});
document.getElementById('search').addEventListener('input', groupAndRender);
document.getElementById('groupBy').addEventListener('change', groupAndRender);

// Wireframe export: walks the rendered card and emits an SVG with one
// labeled rectangle per major region. Loaded into Figma / Excalidraw /
// Penpot as a starting point for layout sketches. One-way for v1 —
// the user iterates in their tool and feeds layout specs back by
// hand (or eventually, via a Grid-Template import we don't have yet).
function exportWireframe() {
  const pane = document.getElementById('cardPane');
  const slug = decodeURIComponent(location.hash.slice(1));
  if (!slug || !BY_SLUG.has(slug)) {
    alert('Select a decl first.');
    return;
  }
  const paneRect = pane.getBoundingClientRect();
  // Capture every region whose layout the user might want to rearrange:
  // the title/doc strip, the data-section blocks, and the meta footer.
  const selectors = [
    '.card-head', '.card-title', '.card-doc',
    '.card-section[data-section]',
    '.card-meta', '.card-fqn',
  ];
  const tiles = [];
  for (const sel of selectors) {
    for (const el of pane.querySelectorAll(sel)) {
      const r = el.getBoundingClientRect();
      const id = el.dataset.section
              || el.className.split(/\s+/).find(c => c.startsWith('card-'))
              || el.tagName.toLowerCase();
      // Translate from viewport coords into pane-local + un-scroll so
      // the SVG covers the full card, not just what's currently visible.
      tiles.push({
        id,
        x: r.left - paneRect.left,
        y: r.top  - paneRect.top + pane.scrollTop,
        w: r.width,
        h: r.height,
      });
    }
  }
  if (tiles.length === 0) {
    alert('Nothing to export — card pane is empty.');
    return;
  }
  const W = paneRect.width;
  const H = tiles.reduce((m, t) => Math.max(m, t.y + t.h), 0) + 24;

  // Solarized-ish wireframe palette so the export reads as a sketch,
  // not a screenshot. Dashed outlines, monospace labels.
  const esc = s => String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
  const parts = [`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`];
  parts.push(`<rect width="100%" height="100%" fill="#f4ecd8"/>`);
  parts.push(`<text x="12" y="18" font-family="JetBrains Mono, monospace" font-size="11" fill="#7a6852">card wireframe · ${esc(slug)} · ${W}×${Math.round(H)}</text>`);
  for (const t of tiles) {
    parts.push(`<g><rect x="${t.x.toFixed(1)}" y="${t.y.toFixed(1)}" width="${t.w.toFixed(1)}" height="${t.h.toFixed(1)}" fill="none" stroke="#983327" stroke-width="1.5" stroke-dasharray="6 4" rx="3"/><text x="${(t.x+8).toFixed(1)}" y="${(t.y+18).toFixed(1)}" font-family="JetBrains Mono, monospace" font-size="12" fill="#983327">${esc(t.id)}</text><text x="${(t.x+8).toFixed(1)}" y="${(t.y+32).toFixed(1)}" font-family="JetBrains Mono, monospace" font-size="10" fill="#7a6852">${Math.round(t.w)}×${Math.round(t.h)}</text></g>`);
  }
  parts.push('</svg>');
  const blob = new Blob([parts.join('\n')], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `wireframe-${slug}.svg`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
document.getElementById('exportWireframe').addEventListener('click', exportWireframe);
document.getElementById('modeToggle').addEventListener('click', toggleMode);

// ---------- Dark / light mode ----------
// Pure-client preference, persisted to localStorage. Works in both
// debug (Flask) and production (static) modes — no API dependency.
// Toggle via the header button or Shift+D.
const MODE_KEY = 'atlas.mode';
function applyMode(mode) {
  document.body.classList.toggle('dark-mode', mode === 'dark');
  const btn = document.getElementById('modeToggle');
  if (btn) btn.textContent = mode === 'dark' ? '◑ light' : '◐ dark';
}
function loadMode() {
  try { return localStorage.getItem(MODE_KEY) || 'light'; }
  catch { return 'light'; }
}
function toggleMode() {
  const next = loadMode() === 'dark' ? 'light' : 'dark';
  try { localStorage.setItem(MODE_KEY, next); } catch {}
  applyMode(next);
}
window.addEventListener('keydown', ev => {
  if (ev.shiftKey && (ev.key === 'D' || ev.key === 'd') &&
      !/^(INPUT|TEXTAREA)$/.test(document.activeElement?.tagName)) {
    ev.preventDefault();
    toggleMode();
  }
});

// Detect whether the Flask annotation API is reachable. If not, we're
// being served as a static bundle (production / GH Pages / embedded
// kuzu) and reviewer affordances (flags, notes, wireframe export) get
// hidden via the `body.mode-production` CSS gate.
async function detectMode() {
  try {
    const r = await fetch('/api/flags', { cache: 'no-store' });
    if (r.ok) {
      document.body.classList.add('mode-debug');
      return 'debug';
    }
  } catch { /* fall through */ }
  document.body.classList.add('mode-production');
  return 'production';
}

(async function main() {
  try {
    applyMode(loadMode());     // apply light/dark before first paint
    const mode = await detectMode();
    await loadAll();
    if (mode === 'debug') {
      await migrateLocalStorageFlags();
      await loadFlags();
    }
    groupAndRender();
    const initial = decodeURIComponent(location.hash.slice(1));
    if (initial && BY_SLUG.has(initial)) selectSlug(initial);
  } catch (e) {
    document.getElementById('tocList').innerHTML =
      `<div style="padding:20px;color:var(--accent)">Failed to load ${GRAPH_URL}: ${A.escapeHtml(e.message)}</div>`;
  }
})();
</script>

</body>
</html>
